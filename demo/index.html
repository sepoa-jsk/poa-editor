<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>poa-editor Demo (S14-S17)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 32px 24px;
      font-family: '맑은 고딕', 'Malgun Gothic', sans-serif;
      background: #f0f2f5; min-height: 100vh;
    }
    h1 { font-size: 18px; margin: 0 0 16px; color: #333; font-weight: 600; }
    poa-editor {
      display: flex;
      width: 100%; max-width: 900px; height: 520px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      border-radius: 6px;
      --poa-editor-border: #ccc;
      --poa-editor-bg: #fff;
    }
    .actions {
      margin-top: 12px; display: flex; gap: 8px; max-width: 900px;
    }
    button {
      padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #f0f0f0; }
    pre#output {
      margin-top: 12px; max-width: 900px; padding: 12px;
      background: #fff; border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; white-space: pre-wrap; word-break: break-all;
      max-height: 200px; overflow-y: auto; display: none;
    }
  </style>
</head>
<body>
  <h1>poa-editor Demo (S14-S17 · 3단 UI)</h1>
  <poa-editor id="editor" placeholder="여기에 입력하세요..."></poa-editor>
  <div class="actions">
    <button id="btn-get-html">HTML 가져오기</button>
    <button id="btn-set-html">샘플 HTML 설정</button>
  </div>
  <pre id="output"></pre>

  <script type="module" src="/src/index.ts"></script>
  <script type="module">
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');

    document.getElementById('btn-get-html').addEventListener('click', () => {
      output.style.display = 'block';
      output.textContent = editor.getHTML();
    });

    document.getElementById('btn-set-html').addEventListener('click', () => {
      editor.setHTML(`<p>안녕하세요! <strong>poa-editor</strong>에 오신 것을 환영합니다.</p><p>텍스트를 선택하고 <em>툴바 버튼</em>으로 서식을 적용해보세요.</p>`);
      output.style.display = 'none';
    });
  </script>
</body>
</html>
