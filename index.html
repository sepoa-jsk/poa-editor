<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>poa-editor v1.0.0 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0; padding: 0;
      font-family: '맑은 고딕', 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .hidden { display: none !important; }
    .header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 12px; height: 36px;
      background: #f0f2f5;
      border-bottom: 1px solid #e5e7eb;
    }
    .header h1 { font-size: 15px; margin: 0; color: #1F2937; font-weight: 700; }
    .header span { font-size: 12px; color: #6B7280; }
    poa-editor {
      flex: 1;
      min-height: 0;
      width: var(--poa-editor-width, 100%);
      border-radius: 0;
      --poa-editor-border: transparent;
      --poa-editor-bg: #fff;
    }
  </style>
  <script type="module" crossorigin src="/poa-editor/assets/main-4tFmrZP4.js"></script>
  <link rel="stylesheet" crossorigin href="/poa-editor/assets/main-Cim276J9.css">
</head>
<body>
  <div class="header">
    <h1>poa-editor</h1>
    <span>v1.0.0 Demo · Vanilla Web Components Rich Text Editor</span>
  </div>

  <div id="editor-root" style="display:contents">
  <poa-editor id="editor" placeholder="여기에 입력하세요..."></poa-editor>
  </div><!-- #editor-root -->

  <div id="user-mode-root"></div>

</body>
</html>
